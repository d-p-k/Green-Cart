spring.application.name=GreenCart

# db configurations
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/greencart?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# seller's credentials
credential.seller.email=${SELLER_EMAIL}
# to generate bcrypt password (pasword - seller) - https://bcrypt-generator.com/
credential.seller.password=${SELLER_PASSWORD}

# frontend url
frontend.url=${FRONTEND_URL}

# app environment
app.environment=${APP_ENVIRONMENT}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL}

